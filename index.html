<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Watching Pit - Horror Physics Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Special Elite', monospace;
            margin: 0;
            overflow: hidden;
            background-color: #050508;
            user-select: none;
            touch-action: none;
        }
        .creepster-title {
            font-family: 'Creepster', cursive, sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Horror panel theme styling */
        .horror-panel {
            background: rgba(10, 10, 14, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(139, 0, 0, 0.4);
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.95), inset 0 0 15px rgba(139, 0, 0, 0.25);
        }
        .horror-text-glow {
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.7);
        }
        /* CRT overlay lines */
        .crt-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            z-index: 5;
            opacity: 0.35;
        }
        /* Aggressive Pulsing Vignette */
        .vignette-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle, transparent 25%, rgba(0, 0, 0, 0.82) 80%, rgba(0, 0, 0, 0.98) 100%);
            z-index: 4;
            mix-blend-mode: multiply;
            animation: vignette-breath 7s ease-in-out infinite alternate;
        }
        @keyframes vignette-breath {
            0% {
                opacity: 0.88;
                transform: scale(1.0);
            }
            100% {
                opacity: 1.0;
                transform: scale(1.02);
            }
        }
    </style>
</head>
<body class="relative w-screen h-screen select-none overflow-hidden">

    <div class="crt-overlay"></div>
    <div class="vignette-overlay"></div>

    <!-- Specimen Selection Interface -->
    <div id="ui-selection" class="absolute inset-0 z-40 flex flex-col justify-between items-center p-6 md:p-12 select-none transition-all duration-1000 opacity-0 pointer-events-none">
        <!-- Header -->
        <div class="text-center mt-4">
            <h2 class="text-3xl md:text-5xl font-bold tracking-widest text-red-600 horror-text-glow creepster-title mb-2">
                CHOOSE THE SPECIMEN
            </h2>
            <p class="text-[10px] md:text-xs text-zinc-400 tracking-widest font-mono">
                SELECT AN EYE BREED DIRECTLY IN THE PIT CONTAINER TO INJECT IT
            </p>
        </div>

        <!-- Dynamic Projected Specimen Information Panel (floats beneath hovered eyeball) -->
        <div id="specimen-details" class="horror-panel absolute max-w-xs md:max-w-sm w-72 md:w-80 px-4 py-3 rounded-xl border border-red-900/40 text-center transition-all duration-300 -translate-x-1/2 opacity-0 pointer-events-none z-50">
            <h3 id="specimen-name" class="text-lg md:text-xl font-bold tracking-wider text-red-500 creepster-title uppercase">VILE STRAIN</h3>
            <p id="specimen-desc" class="text-[10px] md:text-xs text-zinc-400 mt-2 font-mono leading-relaxed">
                Loading database details...
            </p>
        </div>
        
        <!-- Placeholder space replacing old selection buttons -->
        <div></div>
    </div>

    <!-- Top Left Corner: Clean Branding (Fades in post-intro) -->
    <div id="ui-title" class="absolute top-6 left-6 z-30 pointer-events-none opacity-0 transition-opacity duration-1000">
        <h1 class="text-2xl font-bold tracking-widest text-red-600 horror-text-glow creepster-title select-none">THE WATCHING PIT</h1>
    </div>

    <!-- Top Right Corner: Wash, Agitate & Audio Buttons (Fades in post-intro) -->
    <div id="ui-controls" class="absolute top-6 right-6 z-30 flex gap-2 items-center opacity-0 transition-opacity duration-1000 pointer-events-none">
        <button id="btn-audio" class="horror-panel bg-zinc-950/40 hover:bg-zinc-900/60 text-red-400 font-semibold py-2 px-3 rounded-xl border border-zinc-800 hover:border-zinc-700 transition duration-200 text-xs active:scale-95 shadow-xl cursor-pointer" title="Toggle Horror Audio Engine">
            <svg id="svg-audio-off" class="w-4 h-4 fill-current hidden" viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM12 4L9.91 6.09 12 8.18V4zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.03c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 19l-3-3H5v-4h3l3.27-3.27L12 9.45v9.55z"/></svg>
            <svg id="svg-audio-on" class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        </button>
        <button id="btn-clean" class="horror-panel bg-zinc-950/40 hover:bg-zinc-900/60 text-zinc-300 font-semibold py-2 px-5 rounded-xl border border-zinc-800 hover:border-zinc-700 transition duration-200 text-xs active:scale-95 shadow-xl cursor-pointer">
            Wash
        </button>
        <button id="btn-shake" class="horror-panel bg-red-950/30 hover:bg-red-900/40 text-red-200 font-semibold py-2 px-5 rounded-xl border border-red-900/60 hover:border-red-600 transition duration-200 text-xs active:scale-95 shadow-xl cursor-pointer">
            Agitate
        </button>
    </div>

    <!-- Dungeon Loader -->
    <div id="loader" class="absolute inset-0 z-50 bg-[#07070a] flex flex-col items-center justify-center text-zinc-400 transition-opacity duration-1000">
        <div class="relative w-16 h-16 mb-4">
            <div class="absolute inset-0 border border-red-950 rounded-full"></div>
            <div class="absolute inset-0 border-t-2 border-red-600 rounded-full animate-spin"></div>
        </div>
        <h2 class="text-sm font-semibold tracking-widest text-red-600 horror-text-glow font-['Creepster'] text-lg">OPENING THE CONTAINER...</h2>
        <p class="text-[10px] text-zinc-600 mt-2 font-mono">Drawing bloodshot scleras & irises...</p>
    </div>

    <!-- ThreeJS & CannonJS Framework Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    
    <!-- Post-processing dependency shaders loaded strictly first -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/math/SimplexNoise.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/SSAOShader.js"></script>
    
    <!-- Post-processing passes loaded second -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/SSAOPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        const CONFIG = {
            roomWidth: 12,
            roomHeight: 12,
            roomDepth: 12,
            ballRadius: 0.62,
            ballCount: 140,
            maxSplatters: 80 
        };

        let scene, camera, renderer, world;
        let composer, ssaoPass, bloomPass;
        let cubeCamera, cubeRenderTarget;
        let envMap = null;
        let eyeballs = [];
        let splatters = [];
        let bloodDrops = [];
        let activeRipples = [];
        let mouse = new THREE.Vector2();
        let targetMouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();

        // Game State Engine
        let gameState = 'LOADING'; // 'LOADING', 'SELECT', 'TRANSITION_ZOOM', 'INTRO', 'PLAY'

        // Selection Phase variables
        let selectionGroup;
        let selectionEyes = [];
        let selectionLights = [];
        let selectedBreed = 3; // default red
        let hoveredBreedIndex = -1;
        let transitionTimer = 0;
        let zoomStartCamPos = new THREE.Vector3();
        let zoomTargetCamPos = new THREE.Vector3();

        const breedsInfo = [
            { name: "TEAL SIREN", desc: "Drawn from deep aquatic rifts. Emits a freezing oceanic gaze. Features a bioluminescent iris structure with cold light projection capabilities.", color: "#06b6d4" },
            { name: "FERAL SERPENT", desc: "Nocturnal ambush predator. Features a dynamic vertical slit pupil, reptilian scale pigmentation, and hyper-dilated visual tracking.", color: "#f59e0b" },
            { name: "TOXIC MUTANT", desc: "Fleshy matter corrupted by bio-chemical contamination. Dripping in radioactive elements with intense, self-illuminating glowing emissions.", color: "#10b981" },
            { name: "VILE STRAIN", desc: "The original horror specimen. Hyper-bloodshot human sclera displaying advanced cellular decay, high aggression, and visceral vascular details.", color: "#ef4444" }
        ];

        // Physics variables
        let wallPhysicsMat, ballPhysicsMat;
        let dragJoint = null;
        let dummyBody = null;
        let dragPlane = new THREE.Plane();
        let planeNormal = new THREE.Vector3();
        let intersectionPoint = new THREE.Vector3();
        let currentlyDraggedBody = null;

        // Visual blood variables
        let bloodLevel = -5.9;
        const bloodMaxY = 3.5;
        let bleedMultiplier = 0.2;
        let isCeilingDelugeActive = true;
        let bloodPoolMesh;
        let splatTextures = [];
        let dripTrailTexture;

        // Lighting & meshes
        let mainCeilingLight, ambientLight, floorBounceLight, coldFillLight;
        let lightTubeMesh, neonTubeMesh, neonBracket, neonCageGroup, ceilingFlange;

        // Intro Cinematic variables
        let introProgress = 0;
        let transitionProgress = 0;
        let tubeSpline, tubeMesh, introEyeballMesh, introLight, tubeLightMat, fixtureGroup;

        // === Horror Audio Engine ===
        let audioCtx = null;
        let ambientDrone = null;
        let noiseFilter = null;
        let isMuted = false;
        let lastImpactTime = 0;

        function initAudio() {
            if (audioCtx) return;
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
                
                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const droneGain = audioCtx.createGain();
                
                osc1.type = 'sawtooth';
                osc1.frequency.setValueAtTime(55, audioCtx.currentTime); // Low A1
                
                osc2.type = 'square';
                osc2.frequency.setValueAtTime(55.7, audioCtx.currentTime); // Dissonant beating
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(95, audioCtx.currentTime);
                filter.Q.setValueAtTime(4, audioCtx.currentTime);
                
                const lfo = audioCtx.createOscillator();
                const lfoGain = audioCtx.createGain();
                lfo.frequency.setValueAtTime(0.2, audioCtx.currentTime);
                lfoGain.gain.setValueAtTime(25, audioCtx.currentTime);
                lfo.connect(lfoGain);
                lfoGain.connect(filter.frequency);
                
                osc1.connect(filter);
                osc2.connect(filter);
                
                filter.connect(droneGain);
                droneGain.connect(audioCtx.destination);
                
                // Volume of ambient drone reduced to a very subtle 0.05 backdrop hum
                droneGain.gain.setValueAtTime(isMuted ? 0 : 0.05, audioCtx.currentTime);
                
                osc1.start();
                osc2.start();
                lfo.start();
                
                ambientDrone = { osc1, osc2, lfo, droneGain, filter };
            } catch (e) {
                console.warn("Web Audio API not supported or blocked.", e);
            }
        }

        function playImpactSound(intensity) {
            if (!audioCtx || isMuted) return;
            const now = audioCtx.currentTime;
            
            // Impose a strict threshold to prevent sound stacking clicks
            if (now - lastImpactTime < 0.04) return;
            lastImpactTime = now;

            try {
                // Low meaty thump
                const oscLow = audioCtx.createOscillator();
                const gainLow = audioCtx.createGain();
                oscLow.type = 'triangle';
                oscLow.frequency.setValueAtTime(140 * intensity, now);
                oscLow.frequency.exponentialRampToValueAtTime(35, now + 0.32);
                
                gainLow.gain.setValueAtTime(0.35 * intensity, now);
                gainLow.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
                
                // High wet splash snap
                const bufferSize = audioCtx.sampleRate * 0.12; 
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const noiseNode = audioCtx.createBufferSource();
                noiseNode.buffer = buffer;
                
                const bandpass = audioCtx.createBiquadFilter();
                bandpass.type = 'bandpass';
                bandpass.frequency.setValueAtTime(600 + (intensity * 500), now);
                bandpass.Q.setValueAtTime(2.5, now);
                
                const gainHigh = audioCtx.createGain();
                gainHigh.gain.setValueAtTime(0.18 * intensity, now);
                gainHigh.gain.exponentialRampToValueAtTime(0.001, now + 0.12);

                oscLow.connect(gainLow);
                gainLow.connect(audioCtx.destination);
                
                noiseNode.connect(bandpass);
                bandpass.connect(gainHigh);
                gainHigh.connect(audioCtx.destination);
                
                oscLow.start(now);
                oscLow.stop(now + 0.33);
                noiseNode.start(now);
                noiseNode.stop(now + 0.13);
            } catch (err) {}
        }

        function playThrowSound() {
            if (!audioCtx || isMuted) return;
            try {
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(75, now);
                osc.frequency.exponentialRampToValueAtTime(280, now + 0.14); // Rising organic squish launch
                
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.14);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 0.15);
            } catch(e) {}
        }

        function playCinematicTransitionSound() {
            if (!audioCtx || isMuted) return;
            try {
                const now = audioCtx.currentTime;
                const duration = 2.2; // Winding duration

                // 1. Heavy suction rushing vacuum wind sound (swept noise)
                const bufferSize = audioCtx.sampleRate * duration;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                const windNode = audioCtx.createBufferSource();
                windNode.buffer = buffer;
                
                const windFilter = audioCtx.createBiquadFilter();
                windFilter.type = 'bandpass';
                windFilter.frequency.setValueAtTime(180, now);
                windFilter.frequency.exponentialRampToValueAtTime(1400, now + duration);
                windFilter.Q.setValueAtTime(1.8, now);
                
                const windGain = audioCtx.createGain();
                windGain.gain.setValueAtTime(0.01, now);
                windGain.gain.linearRampToValueAtTime(0.25, now + duration * 0.85);
                windGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                
                windNode.connect(windFilter);
                windFilter.connect(windGain);
                windGain.connect(audioCtx.destination);

                // 2. Ascending tension synth riser
                const oscRiser = audioCtx.createOscillator();
                oscRiser.type = 'sawtooth';
                oscRiser.frequency.setValueAtTime(65, now);
                oscRiser.frequency.exponentialRampToValueAtTime(450, now + duration);
                
                const riserFilter = audioCtx.createBiquadFilter();
                riserFilter.type = 'lowpass';
                riserFilter.frequency.setValueAtTime(110, now);
                riserFilter.frequency.exponentialRampToValueAtTime(650, now + duration);
                
                const riserGain = audioCtx.createGain();
                riserGain.gain.setValueAtTime(0.01, now);
                riserGain.gain.linearRampToValueAtTime(0.15, now + duration * 0.9);
                riserGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
                
                oscRiser.connect(riserFilter);
                riserFilter.connect(riserGain);
                riserGain.connect(audioCtx.destination);
                
                windNode.start(now);
                oscRiser.start(now);
            } catch(e) {}
        }

        function playAmbientSizzle() {
            if (!audioCtx || isMuted) return;
            try {
                const now = audioCtx.currentTime;
                const bufferSize = audioCtx.sampleRate * 0.4;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(1400, now);
                filter.Q.setValueAtTime(2.0, now);
                
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.06, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                noise.start();
            } catch (e) {}
        }

        function smoothstep(min, max, value) {
            const x = Math.max(0, Math.min(1, (value - min) / (max - min)));
            return x * x * (3 - 2 * x);
        }

        function initPhysics() {
            world = new CANNON.World();
            world.gravity.set(0, -12, 0); 
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 10;
            
            wallPhysicsMat = new CANNON.Material('wallMaterial');
            ballPhysicsMat = new CANNON.Material('ballMaterial');

            const ballWallContact = new CANNON.ContactMaterial(ballPhysicsMat, wallPhysicsMat, {
                friction: 0.0,          
                restitution: 0.35       
            });
            const ballBallContact = new CANNON.ContactMaterial(ballPhysicsMat, ballPhysicsMat, {
                friction: 0.1,          
                restitution: 0.30       
            });

            world.addContactMaterial(ballWallContact);
            world.addContactMaterial(ballBallContact);

            dummyBody = new CANNON.Body({ mass: 0 });
            dummyBody.collisionFilterGroup = 0;
            dummyBody.collisionFilterMask = 0;
            world.addBody(dummyBody);
        }

        function initSplatTextures() {
            const colors = ['#8f0404', '#590101', '#b30505'];
            for (let t = 0; t < 5; t++) {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = 'rgba(0,0,0,0)';
                ctx.fillRect(0, 0, 128, 128);

                const cx = 64, cy = 64;
                
                if (t === 0) {
                    ctx.fillStyle = colors[0];
                    ctx.beginPath();
                    ctx.arc(cx, cy, 22, 0, Math.PI * 2);
                    ctx.fill();
                    for (let i = 0; i < 14; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const r = 25 + Math.random() * 32;
                        ctx.beginPath();
                        ctx.arc(cx + Math.cos(angle)*r, cy + Math.sin(angle)*r, 1.5 + Math.random()*3.5, 0, Math.PI*2);
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(cx + Math.cos(angle)*(r*0.65), cy + Math.sin(angle)*(r*0.65));
                        ctx.strokeStyle = colors[0];
                        ctx.lineWidth = 1.2;
                        ctx.stroke();
                    }
                } else if (t === 1) {
                    ctx.fillStyle = colors[1];
                    ctx.beginPath();
                    ctx.arc(cx, cy, 16, 0, Math.PI * 2);
                    ctx.fill();
                    for (let i = 0; i < 7; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const length = 18 + Math.random() * 36;
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(cx + Math.cos(angle)*length, cy + Math.sin(angle)*length);
                        ctx.lineWidth = 4 + Math.random()*3;
                        ctx.lineCap = 'round';
                        ctx.strokeStyle = colors[1];
                        ctx.stroke();
                    }
                } else if (t === 2) {
                    ctx.fillStyle = colors[2];
                    ctx.beginPath();
                    ctx.arc(cx, cy, 19, 0, Math.PI * 2);
                    ctx.fill();
                    for (let i = 0; i < 4; i++) {
                        const dx = cx - 14 + i * 10 + (Math.random() - 0.5)*4;
                        const dy = cy;
                        const dlen = 20 + Math.random() * 35;
                        ctx.beginPath();
                        ctx.moveTo(dx, dy);
                        ctx.lineTo(dx, dy + dlen);
                        ctx.lineWidth = 3 + Math.random()*3;
                        ctx.lineCap = 'round';
                        ctx.strokeStyle = colors[2];
                        ctx.stroke();
                    }
                } else if (t === 3) {
                    ctx.fillStyle = colors[2];
                    for (let i = 0; i < 45; i++) {
                        const angle = -Math.PI / 4 + (Math.random() - 0.5) * 0.45;
                        const dist = Math.random() * 50 + 4;
                        const x = cx + Math.cos(angle) * dist + (Math.random() - 0.5) * 6;
                        const y = cy + Math.sin(angle) * dist + (Math.random() - 0.5) * 6;
                        const size = 0.5 + Math.random() * 2.2;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.beginPath();
                    ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                    ctx.fill();
                } else if (t === 4) {
                    ctx.fillStyle = colors[0];
                    ctx.beginPath();
                    ctx.ellipse(cx, cy + 10, 18, 12, Math.PI / 12, 0, Math.PI * 2);
                    ctx.fill();

                    const fingerOffsetsX = [-14, -7, 0, 7, 14];
                    for (let f = 0; f < 5; f++) {
                        const startX = cx + fingerOffsetsX[f];
                        const startY = cy + 5;
                        const streakLength = 35 + Math.random() * 20;
                        
                        ctx.beginPath();
                        ctx.moveTo(startX - 2.5, startY);
                        ctx.lineTo(startX + 2.5, startY);
                        ctx.lineTo(startX + 1.2, startY + streakLength);
                        ctx.lineTo(startX - 1.2, startY + streakLength);
                        ctx.closePath();
                        ctx.fill();
                        
                        ctx.beginPath();
                        ctx.arc(startX, startY + streakLength, 1.8 + Math.random() * 1.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                const texture = new THREE.CanvasTexture(canvas);
                splatTextures.push(texture);
            }
        }

        function initDripTrailTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 128;

        // Re-added the missing blood splatter spawning helper
        function spawnSplatter(position, normal, size) {
            const texIdx = Math.floor(Math.random() * splatTextures.length);
            const splatGeo = new THREE.CircleGeometry(size, 16);
            
            const splatMat = new THREE.MeshStandardMaterial({
                map: splatTextures[texIdx],
                transparent: true,
                opacity: 0.92,
                roughness: 0.02, 
                metalness: 0.05,
                depthWrite: false,
                side: THREE.DoubleSide
            });

            const splat = new THREE.Mesh(splatGeo, splatMat);
            const offsetPos = position.clone().add(normal.clone().multiplyScalar(0.015));
            splat.position.copy(offsetPos);
            
            const lookAtTarget = offsetPos.clone().add(normal);
            splat.lookAt(lookAtTarget);

            scene.add(splat);
            splatters.push({
                mesh: splat,
                creationTime: Date.now(),
                normal: normal.clone(),
                size: size,
                dripDistanceAccumulator: 0,
                dripVelocity: normal.y < 0.5 && Math.abs(normal.y) < 0.8 ? 0.004 + Math.random() * 0.006 : 0
            });

            if (splatters.length > CONFIG.maxSplatters) {
                const oldest = splatters.shift();
                scene.remove(oldest.mesh);
                oldest.mesh.geometry.dispose();
                oldest.mesh.material.dispose();
            }
        }

        function createWallTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#1c1c22';
            ctx.fillRect(0, 0, 1024, 1024);

            for (let i = 0; i < 40000; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const size = Math.random() * 2 + 1;
                const colorVal = Math.floor(Math.random() * 20);
                ctx.fillStyle = `rgba(${colorVal}, ${colorVal + 5}, ${colorVal + 8}, 0.25)`;
                ctx.fillRect(x, y, size, size);
            }

            for (let i = 0; i < 45; i++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const r = Math.random() * 200 + 50;
                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                grad.addColorStop(0, 'rgba(5, 12, 5, 0.45)');
                grad.addColorStop(0.5, 'rgba(10, 10, 12, 0.2)');
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = 'rgba(26, 6, 6, 0.85)';
            for (let s = 0; s < 25; s++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const size = Math.random() * 45 + 10;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
                
                if (Math.random() < 0.4) {
                    const len = Math.random() * 200 + 50;
                    ctx.beginPath();
                    ctx.moveTo(x - size * 0.4, y);
                    ctx.quadraticCurveTo(x, y + len, x + size * 0.4, y);
                    ctx.fill();
                }
            }

            ctx.fillStyle = 'rgba(92, 2, 2, 0.9)';
            for (let s = 0; s < 30; s++) {
                const x = Math.random() * 1024;
                const y = Math.random() * 1024;
                const size = Math.random() * 30 + 5;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawHandSmear(c, x, y, len) {
                c.save();
                c.translate(x, y);
                c.fillStyle = 'rgba(74, 1, 1, 0.85)';
                c.beginPath();
                c.arc(0, 0, 18, 0, Math.PI * 2);
                c.fill();
                
                const fingers = [-12, -6, 0, 6, 12];
                fingers.forEach(fx => {
                    const grad = c.createLinearGradient(fx, 0, fx, len);
                    grad.addColorStop(0, 'rgba(74, 1, 1, 0.9)');
                    grad.addColorStop(0.3, 'rgba(74, 1, 1, 0.6)');
                    grad.addColorStop(0.7, 'rgba(74, 1, 1, 0.25)');
                    grad.addColorStop(1, 'rgba(74, 1, 1, 0.0)');
                    
                    c.fillStyle = grad;
                    c.beginPath();
                    c.moveTo(fx - 2.5, 0);
                    c.lineTo(fx + 2.5, 0);
                    c.lineTo(fx + 1.2, len);
                    c.lineTo(fx - 1.2, len);
                    c.closePath();
                    c.fill();
                });
                c.restore();
            }

            function drawPalmPrint(c, x, y, r, angle) {
                c.save();
                c.translate(x, y);
                c.rotate(angle);
                c.scale(r, r);
                c.fillStyle = 'rgba(92, 2, 2, 0.88)';
                
                c.beginPath();
                c.ellipse(0, 0, 14, 11, 0, 0, Math.PI * 2);
                c.fill();
                
                const list = [
                    {x: -11, y: -14, r: 2.2}, 
                    {x: -6,  y: -21, r: 2.8}, 
                    {x: 0,   y: -23, r: 3.0}, 
                    {x: 6,   y: -20, r: 2.8}, 
                    {x: 11,  y: -14, r: 2.2}  
                ];
                list.forEach(f => {
                    c.beginPath();
                    c.arc(f.x, f.y, f.r, 0, Math.PI * 2);
                    c.fill();
                });
                c.restore();
            }

            function drawScratchMarks(c, x, y, len, angle) {
                c.save();
                c.translate(x, y);
                c.rotate(angle);
                c.strokeStyle = '#1c1c22'; 
                c.lineWidth = 1.8;
                c.lineCap = 'round';
                
                for (let i = 0; i < 4; i++) {
                    const dy = i * 5 - 7.5;
                    c.beginPath();
                    c.moveTo(0, dy);
                    c.bezierCurveTo(len * 0.3, dy + (Math.random() - 0.5) * 5, len * 0.7, dy + (Math.random() - 0.5) * 5, len, dy);
                    c.stroke();
                }
                c.restore();
            }

            if (type === 'back') {
                drawHandSmear(ctx, 350, 480, 250);
                drawPalmPrint(ctx, 420, 400, 1.25, -0.25);
                drawScratchMarks(ctx, 220, 520, 180, 0.3);
            } else if (type === 'left') {
                drawPalmPrint(ctx, 320, 580, 1.1, 0.4);
            } else if (type === 'right') {
                drawHandSmear(ctx, 600, 380, 220);
                drawScratchMarks(ctx, 580, 410, 160, -0.15);
                drawPalmPrint(ctx, 720, 480, 1.0, 0.1);
            }

            ctx.fillStyle = 'rgba(180, 5, 5, 0.95)';
            for (let drip = 0; drip < 15; drip++) {
                const startX = Math.random() * 1024;
                const dripLen = Math.random() * 400 + 100;
                ctx.beginPath();
                ctx.moveTo(startX - 8, 0);
                ctx.quadraticCurveTo(startX, dripLen, startX + 8, 0);
                ctx.fill();

                ctx.beginPath();
                ctx.arc(startX, dripLen - 5, Math.random() * 10 + 5, 0, Math.PI * 2);
                ctx.fill();
            }

            if (type === 'back') {
                ctx.strokeStyle = 'rgba(180, 5, 5, 0.98)';
                ctx.lineWidth = 6;
                ctx.font = '75px "Special Elite", monospace';
                ctx.strokeText('✝', 800, 200);
                ctx.strokeText('☠', 150, 750);
                
                ctx.beginPath();
                ctx.moveTo(500, 700); ctx.lineTo(500, 780);
                ctx.moveTo(520, 700); ctx.lineTo(520, 780);
                ctx.moveTo(540, 700); ctx.lineTo(540, 780);
                ctx.moveTo(560, 700); ctx.lineTo(560, 780);
                ctx.moveTo(480, 760); ctx.lineTo(580, 720);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function createEyeballTexture(typeIndex, bloodStyle = 0) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            const midX = 256;
            const midY = 128;

            ctx.fillStyle = '#dbd4ca';
            ctx.fillRect(0, 0, 512, 256);

            let scleraGrad = ctx.createRadialGradient(midX, midY, 60, midX, midY, 250);
            scleraGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
            scleraGrad.addColorStop(0.7, 'rgba(110, 35, 35, 0.25)');
            scleraGrad.addColorStop(1, 'rgba(0, 0, 0, 0.85)');
            ctx.fillStyle = scleraGrad;
            ctx.fillRect(0, 0, 512, 256);

            ctx.strokeStyle = 'rgba(150, 8, 8, 0.9)';
            ctx.lineWidth = 1.3;
            for (let i = 0; i < 50; i++) {
                ctx.beginPath();
                const angle = Math.random() * Math.PI * 2;
                const startR = 55; 
                const endR = 220;
                
                let cx = midX + Math.cos(angle) * startR;
                let cy = midY + Math.sin(angle) * startR;
                ctx.moveTo(cx, cy);

                const segments = 5;
                for (let j = 0; j < segments; j++) {
                    const currentR = startR + (endR - startR) * (j / segments);
                    const variance = (Math.random() - 0.5) * 22;
                    const nextX = midX + Math.cos(angle) * currentR + variance;
                    const nextY = midY + Math.sin(angle) * currentR + variance;
                    ctx.lineTo(nextX, nextY);
                }
                ctx.stroke();
            }

            let irisRadius = 55;
            let irisGrad = ctx.createRadialGradient(midX, midY, 0, midX, midY, irisRadius);

            if (typeIndex === 0) {
                irisGrad.addColorStop(0, '#011c1e');
                irisGrad.addColorStop(0.5, '#005f73');
                irisGrad.addColorStop(0.8, '#0a9396');
                irisGrad.addColorStop(1, '#001219');
            } else if (typeIndex === 1) {
                irisGrad.addColorStop(0, '#801a1a');
                irisGrad.addColorStop(0.4, '#e9d8a6');
                irisGrad.addColorStop(0.9, '#dd8000');
                irisGrad.addColorStop(1, '#000000');
            } else if (typeIndex === 2) {
                irisGrad.addColorStop(0, '#000000');
                irisGrad.addColorStop(0.3, '#39ff14');
                irisGrad.addColorStop(0.7, '#004b23');
                irisGrad.addColorStop(1, '#000000');
            } else {
                irisGrad.addColorStop(0, '#ffffff');
                irisGrad.addColorStop(0.3, '#ff0033');
                irisGrad.addColorStop(0.8, '#4a081a');
                irisGrad.addColorStop(1, '#080002');
            }

            ctx.fillStyle = irisGrad;
            ctx.beginPath();
            ctx.arc(midX, midY, irisRadius, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 1.5;
            for (let f = 0; f < 360; f += 6) {
                const rad = (f * Math.PI) / 180;
                ctx.beginPath();
                ctx.moveTo(midX + Math.cos(rad) * 15, midY + Math.sin(rad) * 15);
                ctx.lineTo(midX + Math.cos(rad) * irisRadius, midY + Math.sin(rad) * irisRadius);
                ctx.stroke();
            }

            ctx.fillStyle = '#000000';
            ctx.beginPath();
            if (typeIndex === 1) {
                ctx.ellipse(midX, midY, 8, 38, 0, 0, Math.PI * 2);
            } else {
                ctx.arc(midX, midY, 20, 0, Math.PI * 2);
            }
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
            ctx.beginPath();
            ctx.ellipse(midX - 18, midY - 18, 12, 6, Math.PI / 4, 0, Math.PI * 2);
            ctx.fill();

            if (bloodStyle === 1) {
                ctx.fillStyle = 'rgba(125, 2, 2, 0.75)';
                for (let h = 0; h < 3; h++) {
                    const offsetAngle = Math.random() * Math.PI * 2;
                    const offsetDist = 65 + Math.random() * 100;
                    const rx = midX + Math.cos(offsetAngle) * offsetDist;
                    const ry = midY + Math.sin(offsetAngle) * offsetDist;
                    ctx.beginPath();
                    ctx.arc(rx, ry, 18 + Math.random() * 24, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.strokeStyle = 'rgba(100, 1, 1, 0.9)';
                    ctx.lineWidth = 1.6;
                    for (let v = 0; v < 5; v++) {
                        ctx.beginPath();
                        ctx.moveTo(rx, ry);
                        ctx.quadraticCurveTo(
                            rx + (Math.random() - 0.5) * 60,
                            ry + (Math.random() - 0.5) * 60,
                            rx + (Math.random() - 0.5) * 90,
                            ry + (Math.random() - 0.5) * 90
                        );
                        ctx.stroke();
                    }
                }
            } else if (bloodStyle === 2) {
                ctx.fillStyle = 'rgba(38, 1, 1, 0.9)';
                ctx.fillRect(0, 0, 48, 256);
                ctx.fillRect(512 - 48, 0, 48, 256);
                
                ctx.fillStyle = 'rgba(74, 1, 1, 0.85)';
                for (let k = 0; k < 12; k++) {
                    ctx.beginPath();
                    ctx.arc(48, k * 23, 10 + Math.random() * 12, 0, Math.PI * 2);
                    ctx.arc(512 - 48, k * 23, 10 + Math.random() * 12, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (bloodStyle === 3) {
                let bloodWash = ctx.createRadialGradient(midX, midY, 0, midX, midY, irisRadius + 8);
                bloodWash.addColorStop(0, 'rgba(141, 3, 3, 0.9)');
                bloodWash.addColorStop(0.6, 'rgba(92, 2, 2, 0.75)');
                bloodWash.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = bloodWash;
                ctx.beginPath();
                ctx.arc(midX, midY, irisRadius + 8, 0, Math.PI * 2);
                ctx.fill();
            } else if (bloodStyle === 4) {
                ctx.strokeStyle = 'rgba(145, 4, 4, 0.88)';
                ctx.lineWidth = 1.6;
                for (let d = 0; d < 3; d++) {
                    const dripX = midX - 90 + d * 90 + (Math.random() - 0.5) * 20;
                    ctx.beginPath();
                    ctx.moveTo(dripX, 0);
                    const dropY = 90 + Math.random() * 110;
                    ctx.bezierCurveTo(dripX - 12, dropY * 0.35, dripX + 18, dropY * 0.65, dripX, dropY);
                    ctx.stroke();
                    
                    ctx.fillStyle = 'rgba(145, 4, 4, 0.98)';
                    ctx.beginPath();
                    ctx.arc(dripX, dropY, 3.2, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020204);
            scene.fog = new THREE.FogExp2(0x020204, 0.055);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0.2, 13); 

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.15; 
            document.body.appendChild(renderer.domElement);

            (function buildEnvMap() {
                const pmrem = new THREE.PMREMGenerator(renderer);
                pmrem.compileEquirectangularShader();

                const envScene = new THREE.Scene();
                const topLight = new THREE.HemisphereLight(0x0a0005, 0x3a0000, 1.0);

        function createBloodPool() {
            const hw = CONFIG.roomWidth;
            const hd = CONFIG.roomDepth;
            
            const poolGeo = new THREE.PlaneGeometry(hw, hd, 100, 100);
            poolGeo.rotateX(-Math.PI / 2);

            const poolMat = new THREE.MeshStandardMaterial({
                color: 0x3b0000,
                emissive: 0x3a0000,
                emissiveIntensity: 0.1,
                roughness: 0.02, 
                metalness: 0.1,
                envMapIntensity: 1.8,
                transparent: true,
                opacity: 0.92,
                flatShading: false
            });

            poolMat.userData = { time: { value: 0 } };
            poolMat.onBeforeCompile = (shader) => {
                shader.uniforms.uTime = poolMat.userData.time;

                shader.vertexShader = `
                    varying vec3 vWorldPosition;
                ` + shader.vertexShader;

                shader.vertexShader = shader.vertexShader.replace(
                    '#include <worldpos_vertex>',
                    `
                    #include <worldpos_vertex>
                    vWorldPosition = worldPosition.xyz;
                    `
                );

                shader.fragmentShader = `
                    uniform float uTime;
                    varying vec3 vWorldPosition;
                ` + shader.fragmentShader;

                shader.fragmentShader = shader.fragmentShader.replace(
                    '#include <emissivemap_fragment>',
                    `
                    #include <emissivemap_fragment>
                    
                    vec3 worldNormal = normalize(inverseTransformDirection(geometryNormal, viewMatrix));
                    vec3 worldView = normalize(vWorldPosition - cameraPosition);
                    vec3 R = reflect(worldView, worldNormal);
                    
                    float neonY = 3.2;
                    float neonZ = -5.35;
                    
                    if (R.y > 0.01) {
                        float dy = neonY - vWorldPosition.y;
                        vec3 I = vWorldPosition + R * (dy / R.y);
                        float t_seg = clamp(I.x, -2.5, 2.5);
                        vec3 closestPoint = vec3(t_seg, neonY, neonZ);
                        float dist = distance(I, closestPoint);
                        
                        float reflectionGlow = smoothstep(1.8, 0.0, dist) * 1.2;
                        reflectionGlow += smoothstep(0.35, 0.0, dist) * 4.0;
                        
                        reflectionGlow *= smoothstep(0.0, 0.15, R.y);
                        
                        vec3 neonReflectionColor = vec3(1.0, 0.0, 0.1) * reflectionGlow;
                        totalEmissiveRadiance += neonReflectionColor;
                    }
                    
                    float borderDistX = 6.0 - abs(vWorldPosition.x);
                    float borderDistZ = 6.0 - abs(vWorldPosition.z);
                    float borderDist = min(borderDistX, borderDistZ);
                    
                    float pulse = 0.85 + 0.15 * sin(vWorldPosition.x * 1.5 + vWorldPosition.z * 1.5 + uTime * 3.5);
                    float rimGlow = smoothstep(0.28, 0.01, borderDist) * 1.8 * pulse;
                    
                    totalEmissiveRadiance += vec3(0.7, 0.01, 0.03) * rimGlow;

                    float cx = vWorldPosition.x;
                    float cz = vWorldPosition.z;

                    float wave1 = sin(cx * 2.3 + cz * 1.7 + uTime * 1.1) 
                                + sin(cx * 1.5 - cz * 2.8 + uTime * 0.8);
                    float wave2 = sin(cx * 3.1 - cz * 1.2 + uTime * 1.4) 
                                + sin(-cx * 2.0 + cz * 3.5 + uTime * 0.6);

                    float causticRaw = (wave1 * 0.5 + 0.5) * (wave2 * 0.5 + 0.5);
                    float caustic = pow(max(0.0, causticRaw - 0.55) / 0.45, 2.2);

                    totalEmissiveRadiance += vec3(0.55, 0.0, 0.02) * caustic * 0.55;
                    `
                );
            };

            bloodPoolMesh = new THREE.Mesh(poolGeo, poolMat);
            bloodPoolMesh.position.set(0, bloodLevel, 0);
            scene.add(bloodPoolMesh);

            if (cubeCamera && cubeRenderTarget) {
                scene.add(cubeCamera);
                poolMat.envMap = cubeRenderTarget.texture;
                poolMat.needsUpdate = true;
            }
        }

                new THREE.Vector3(-1.5, 3.5, 5.5),

                new THREE.Vector3(0, 6.02, 0.0) 
            ]);

            const tubeGeo = new THREE.TubeGeometry(tubeSpline, 64, 0.72, 16, false);
            
            const tubeMat = new THREE.MeshStandardMaterial({
                map: createTubeConcreteTexture(),
                roughness: 0.95,
                metalness: 0.1,
                side: THREE.DoubleSide, 
                depthWrite: true

            tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
            scene.add(tubeMesh);

            const ringGeo = new THREE.TorusGeometry(0.74, 0.09, 8, 24);
            const ringMat = new THREE.MeshStandardMaterial({

                roughness: 0.7, 
                metalness: 0.8 
            });

            fixtureGroup = new THREE.Group();

            for (let i = 0; i < 0.95; i += 0.15) {
                const p = tubeSpline.getPointAt(i);
                const t = tubeSpline.getTangentAt(i);

                fixtureGroup.add(ring);

            const introEyeballGeo = new THREE.SphereGeometry(CONFIG.ballRadius, 32, 32);

            fixtureGroup.add(tube2);
            
            fixtureGroup.position.set(-1.0, 4.8, 8.5);

        function endIntroSequence() {
            scene.remove(tubeMesh);
            scene.remove(introEyeballMesh);
            scene.remove(fixtureGroup);
            scene.remove(introLight);
            
            tubeMesh.geometry.dispose();
            tubeMesh.material.dispose();
            introEyeballMesh.geometry.dispose();
            introEyeballMesh.material.dispose();
            fixtureGroup.traverse(child => {
                if (child.geometry) child.geometry.dispose();
                if (child.material) child.material.dispose();
            });

            const leadEyeball = eyeballs[0];
            leadEyeball.body.position.set(0, 5.8, 0);
            leadEyeball.body.velocity.set(0, -22, 0); 
            leadEyeball.body.angularVelocity.set(
                (Math.random() - 0.5) * 12,
                (Math.random() - 0.5) * 12,
                (Math.random() - 0.5) * 12
            );

            const dynamicLeadTex = createEyeballTexture(selectedBreed, 0);
            leadEyeball.mesh.material.map = dynamicLeadTex;
            leadEyeball.breed = selectedBreed;
            leadEyeball.targetEmissive = (selectedBreed === 2) ? new THREE.Color(0x156000) : ((selectedBreed === 3) ? new THREE.Color(0x350005) : new THREE.Color(0x000000));
            leadEyeball.mesh.material.needsUpdate = true;

            leadEyeball.body.wakeUp();

            addRipple(0, 0, 1.1);
            // Dynamic wet splashdown on transition completion
            playImpactSound(1.2); 
            triggerBloodBurst(new THREE.Vector3(0, bloodLevel + 0.15, 0), 12);
            adjustBloodVolume(0.04); 

            document.getElementById('ui-title').classList.remove('opacity-0');
            const controls = document.getElementById('ui-controls');
            controls.classList.remove('opacity-0', 'pointer-events-none');
            
            gameState = 'PLAY';
        }
