            const texturePool = [];
            for (let breed = 0; breed < 4; breed++) {
                texturePool[breed] = [];
                for (let treatment = 0; treatment < 5; treatment++) {
                    texturePool[breed][treatment] = createEyeballTexture(breed, treatment);
                }
            }

            for (let i = 0; i < CONFIG.ballCount; i++) {
                const breedIndex = (i === 0) ? selectedBreed : Math.floor(Math.random() * 4);
                
                let treatmentIndex = 0;
                if (Math.random() < 0.20 && i !== 0) {
                    treatmentIndex = 1 + Math.floor(Math.random() * 4);
                }
                
                const assignedTexture = texturePool[breedIndex][treatmentIndex];

                const ballMat = new THREE.MeshPhysicalMaterial({
                    map: assignedTexture,
                    roughness: 0.01,           
                    metalness: 0.05,           
                    clearcoat: 1.0,            
                    clearcoatRoughness: 0.005, 
                    reflectivity: 1.0,
                    envMapIntensity: 2.2,
                    ior: 1.8,                  
                    vertexColors: true         
                });

                if (breedIndex === 2) {
                    ballMat.emissive = new THREE.Color(0x156000);
                    ballMat.emissiveIntensity = 0.55;
                } else if (breedIndex === 3) {
                    ballMat.emissive = new THREE.Color(0x350005);
                    ballMat.emissiveIntensity = 0.35;
                }

                const mesh = new THREE.Mesh(sphereGeo, ballMat);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);

                const shape = new CANNON.Sphere(CONFIG.ballRadius);
                const body = new CANNON.Body({
                    mass: 1.5,
                    shape: shape,
                    material: ballPhysicsMat,
                    linearDamping: 0.05, 
                    angularDamping: 0.1  
                });
                body.allowSleep = false; 

                const rx = CONFIG.roomWidth - CONFIG.ballRadius * 4;
                const rz = CONFIG.roomDepth - CONFIG.ballRadius * 4;

                const posX = (Math.random() - 0.5) * rx;
                const posY = -5.0 + (Math.random() * 3.2); 
                const posZ = (Math.random() - 0.5) * rz;

                body.position.set(posX, posY, posZ);

                body.angularVelocity.set(
                    Math.random() * 0.5,
                    Math.random() * 0.5,
                    Math.random() * 0.5
                );

                body.addEventListener('collide', (e) => {
                    const contact = e.contact;
                    if (!contact) return;

                    const impactVel = contact.getImpactVelocityAlongNormal();
                    
                    // Lowered bounce sound threshold dramatically to 0.8 so all normal bounces inside container play sound!
                    if (impactVel > 0.8) {
                        const intensity = Math.min(1.0, impactVel * 0.18);
                        playImpactSound(intensity);

                        if (impactVel > 3.5) {
                            eyeballItem.bloodiness = Math.min(1.0, eyeballItem.bloodiness + (impactVel * 0.02 * bleedMultiplier));
                            
                            const hitPoint = new THREE.Vector3(
                                contact.bi.position.x + contact.ri.x,
                                contact.bi.position.y + contact.ri.y,
                                contact.bi.position.z + contact.ri.z
                            );

                            const collNormal = new THREE.Vector3(
                                contact.ni.x,
                                contact.ni.y,
                                contact.ni.z
                            );

                            const isWallImpact = (contact.bi.mass === 0 || contact.bj.mass === 0);
                            if (isWallImpact) {
                                if (contact.bi.mass !== 0) {
                                    collNormal.negate();
                                }

                                if (impactVel > 5.0 && Math.random() < 0.25) {
                                    const splatScale = (0.2 + Math.random() * 0.3) * (impactVel / 12.0);
                                    spawnSplatter(hitPoint, collNormal, Math.min(0.8, Math.max(0.15, splatScale)));
                                }
                                
                                if (Math.random() < 0.4) {
                                    triggerBloodBurst(hitPoint, Math.min(4, Math.floor(impactVel * 0.3)));
                                }
                                adjustBloodVolume(impactVel * 0.0015 * bleedMultiplier);
                            }
                        }
                    }
                });

                world.addBody(body);
                const eyeballItem = { 
                    mesh, 
                    body,
                    breed: breedIndex,
                    baseRotationOffset: new THREE.Euler(0, -Math.PI/2, 0),
                    bloodiness: 0.0,
                    baseColor: new THREE.Color(0xffffff),
                    targetEmissive: (breedIndex === 2) ? new THREE.Color(0x156000) : ((breedIndex === 3) ? new THREE.Color(0x350005) : new THREE.Color(0x000000))
                };
                eyeballs.push(eyeballItem);
            }
        }

        function adjustBloodVolume(amount) {
            bloodLevel = Math.min(bloodMaxY, bloodLevel + amount);
            
            const range = bloodMaxY - (-5.9);
            const progress = ((bloodLevel - (-5.9)) / range);

            if (floorBounceLight) {
                floorBounceLight.position.y = bloodLevel + 0.5;
                floorBounceLight.intensity = 1.0 + progress * 5.5; 
                floorBounceLight.distance = 12.0 + progress * 10.0;
            }

            if (bloodPoolMesh && bloodPoolMesh.material) {
                bloodPoolMesh.material.emissiveIntensity = 0.1 + (progress * 1.7);
            }
        }

        function setupInteractions() {
            const updateMousePosition = (clientX, clientY) => {
                targetMouse.x = (clientX / window.innerWidth) * 2 - 1;
                targetMouse.y = -(clientY / window.innerHeight) * 2 + 1;
            };

            window.addEventListener('pointermove', (e) => {
                updateMousePosition(e.clientX, e.clientY);
            });

            const handleStart = (clientX, clientY, pointerId) => {
                if (gameState !== 'PLAY') return; 

                updateMousePosition(clientX, clientY);
                mouse.copy(targetMouse);

                raycaster.setFromCamera(mouse, camera);
                const meshes = eyeballs.map(b => b.mesh);
                const intersects = raycaster.intersectObjects(meshes);

                if (intersects.length > 0) {
                    const hitMesh = intersects[0].object;
                    const hitBall = eyeballs.find(b => b.mesh === hitMesh);

                    if (hitBall) {
                        // Safe sandbox Pointer Capture encapsulation
                        try {
                            renderer.domElement.setPointerCapture(pointerId);
                        } catch (err) {
                            console.warn("setPointerCapture bypassed due to IFrame sandbox focus limit:", err);
                        }

                        currentlyDraggedBody = hitBall.body;
                        currentlyDraggedBody.wakeUp();
                        dragHistory = [];

                        triggerBloodBurst(intersects[0].point, 8);
                        hitBall.bloodiness = Math.min(1.0, hitBall.bloodiness + 0.15 * bleedMultiplier);

                        const hitPoint = intersects[0].point;
                        const localHitPoint = new CANNON.Vec3(0, 0, 0);

                        planeNormal.copy(camera.position).normalize();
                        dragPlane.setFromNormalAndCoplanarPoint(planeNormal, hitPoint);

                        const limitX = CONFIG.roomWidth / 2 - 0.5 - CONFIG.ballRadius;
                        const limitY = CONFIG.roomHeight / 2 - 0.5 - CONFIG.ballRadius;
                        const limitZ = CONFIG.roomDepth / 2 - 0.5 - CONFIG.ballRadius;

                        const clampedHitPoint = hitPoint.clone();
                        clampedHitPoint.x = Math.max(-limitX, Math.min(limitX, clampedHitPoint.x));
                        clampedHitPoint.y = Math.max(-limitY, Math.min(limitY, clampedHitPoint.y));
                        clampedHitPoint.z = Math.max(-limitZ, Math.min(limitZ, clampedHitPoint.z));

                        dummyBody.position.copy(clampedHitPoint);
                        dragJoint = new CANNON.PointToPointConstraint(
                            currentlyDraggedBody,
                            localHitPoint,
                            dummyBody,
                            new CANNON.Vec3(0, 0, 0)
                        );
                        world.addConstraint(dragJoint);
                    }
                }
            };

            window.addEventListener('pointerdown', (e) => {
                if (e.target.closest('button') || e.target.closest('.horror-panel')) {
                    return;
                }
                if (gameState === 'SELECT') {
                    updateMousePosition(e.clientX, e.clientY);
                    mouse.copy(targetMouse);
                    raycaster.setFromCamera(mouse, camera);
                    const choiceMeshes = selectionEyes.map(se => se.mesh);
                    const intersects = raycaster.intersectObjects(choiceMeshes);
                    if (intersects.length > 0) {
                        const hitEye = selectionEyes.find(se => se.mesh === intersects[0].object);
                        if (hitEye) {
                            selectBreedAndDive(hitEye.breed);
                        }
                    }
                } else if (gameState === 'PLAY') {
                    handleStart(e.clientX, e.clientY, e.pointerId);
                }
            });

            let dragHistory = [];

            const handleMove = (clientX, clientY) => {
                if (!dragJoint || !currentlyDraggedBody) return;

                updateMousePosition(clientX, clientY);
                mouse.copy(targetMouse);

                raycaster.setFromCamera(mouse, camera);
                
                if (raycaster.ray.intersectPlane(dragPlane, intersectionPoint)) {
                    const limitX = CONFIG.roomWidth / 2 - 0.5 - CONFIG.ballRadius;
                    const limitY = CONFIG.roomHeight / 2 - 0.5 - CONFIG.ballRadius;
                    const limitZ = CONFIG.roomDepth / 2 - 0.5 - CONFIG.ballRadius;

                    intersectionPoint.x = Math.max(-limitX, Math.min(limitX, intersectionPoint.x));
                    intersectionPoint.y = Math.max(-limitY, Math.min(limitY, intersectionPoint.y));
                    intersectionPoint.z = Math.max(-limitZ, Math.min(limitZ, intersectionPoint.z));

                    dragHistory.push({ pos: intersectionPoint.clone(), time: performance.now() });
                    if (dragHistory.length > 5) dragHistory.shift();

                    dummyBody.position.copy(intersectionPoint);
                    currentlyDraggedBody.wakeUp();
                }
            };

            window.addEventListener('pointermove', (e) => {
                if (gameState === 'PLAY') {
                    handleMove(e.clientX, e.clientY);
                }
            });

            const handleEnd = (e) => {
                if (dragJoint) {
                    world.removeConstraint(dragJoint);
                    dragJoint = null;
                }
                if (currentlyDraggedBody) {
                    currentlyDraggedBody.wakeUp();

                    if (dragHistory.length >= 2) {
                        const newest = dragHistory[dragHistory.length - 1];
                        const oldest = dragHistory[0];
                        const dt = (newest.time - oldest.time) / 1000; 
                        if (dt > 0) {
                            const throwScale = 8.0; 
                            const vx = ((newest.pos.x - oldest.pos.x) / dt) * throwScale;
                            const vy = ((newest.pos.y - oldest.pos.y) / dt) * throwScale;
                            const vz = ((newest.pos.z - oldest.pos.z) / dt) * throwScale;
                            currentlyDraggedBody.velocity.set(
                                Math.max(-25, Math.min(25, vx)),
                                Math.max(-25, Math.min(25, vy)),
                                Math.max(-25, Math.min(25, vz))
                            );
                            
                            // Emit throw swoosh sound
                            playThrowSound();
                        }
                    }
                    dragHistory = [];
                    currentlyDraggedBody = null;
                }
                try {
                    renderer.domElement.releasePointerCapture(e.pointerId);
                } catch(err) {}
            };

            window.addEventListener('pointerup', handleEnd);
            window.addEventListener('pointercancel', handleEnd);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (composer) composer.setSize(window.innerWidth, window.innerHeight);
                if (ssaoPass) ssaoPass.setSize(window.innerWidth, window.innerHeight);
                if (bloomPass) bloomPass.setSize(window.innerWidth, window.innerHeight);
            });

            const triggerWash = (e) => {
                if (e) {
                    e.stopPropagation();
                    e.preventDefault();
                }

                if (dragJoint) {
                    world.removeConstraint(dragJoint);
                    dragJoint = null;
                }
                currentlyDraggedBody = null;

                for (let i = splatters.length - 1; i >= 0; i--) {
                    const s = splatters[i];
                    if (s && s.mesh) {
                        scene.remove(s.mesh);
                        s.mesh.geometry.dispose();
                        if (s.mesh.material && s.mesh.material.dispose) {
                            s.mesh.material.dispose();
                        }
                    }
                }
                splatters = [];

                bloodDrops.forEach(drop => {
                    scene.remove(drop.mesh);
                    drop.mesh.geometry.dispose();
                    drop.mesh.material.dispose();
                });
                bloodDrops = [];

                const rx = CONFIG.roomWidth - CONFIG.ballRadius * 4;
                const rz = CONFIG.roomDepth - CONFIG.ballRadius * 4;

                eyeballs.forEach(e => {
                    e.bloodiness = 0;
                    e.body.wakeUp(); 
                    
                    const posX = (Math.random() - 0.5) * rx;
                    const posY = -3 + (Math.random() * 5); 
                    const posZ = (Math.random() - 0.5) * rz;

                    e.body.position.set(posX, posY, posZ);
                    e.body.velocity.set(0, 0, 0);
                    e.body.angularVelocity.set(0, 0, 0);
                });

                bloodLevel = -5.9;
                activeRipples = [];
                if (floorBounceLight) {
                    floorBounceLight.position.y = bloodLevel + 0.5;
                }
                if (bloodPoolMesh && bloodPoolMesh.material) {
                    bloodPoolMesh.material.emissiveIntensity = 0.1;
                }
                adjustBloodVolume(0);
                playAmbientSizzle();
            };

            window._agitateBoost = 0;
            const triggerShake = (e) => {
                if (e) {
                    e.stopPropagation();
                    e.preventDefault();
                }

                window._agitateBoost = 240;

                eyeballs.forEach(ball => {
                    ball.body.wakeUp();
                    const impulseForce = new CANNON.Vec3(
                        (Math.random() - 0.5) * 6, 
                        Math.random() * 8 + 4,     
                        (Math.random() - 0.5) * 6
                    );
                    ball.body.applyImpulse(impulseForce, ball.body.position);
                    
                    if (Math.random() < 0.15) {
                        triggerBloodBurst(ball.mesh.position, 4);
                    }
                });
            };

            const btnClean = document.getElementById('btn-clean');
            const btnShake = document.getElementById('btn-shake');

            btnClean.addEventListener('pointerdown', triggerWash);
            btnClean.addEventListener('click', triggerWash);

            btnShake.addEventListener('pointerdown', triggerShake);
            btnShake.addEventListener('click', triggerShake);

            const btnAudio = document.getElementById('btn-audio');
            const svgAudioOn = document.getElementById('svg-audio-on');
            const svgAudioOff = document.getElementById('svg-audio-off');

            btnAudio.addEventListener('click', () => {
                isMuted = !isMuted;
                if (isMuted) {
                    svgAudioOn.classList.add('hidden');
                    svgAudioOff.classList.remove('hidden');
                    if (ambientDrone) {
                        ambientDrone.droneGain.gain.setValueAtTime(0, audioCtx.currentTime);
                    }
                } else {
                    svgAudioOn.classList.remove('hidden');
                    svgAudioOff.classList.add('hidden');
                    initAudio(); 
                    if (ambientDrone) {
                        // Matching the new subtle 0.05 default volume setting
                        ambientDrone.droneGain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                    }
                }
            });
        }

        const fixedTimeStep = 1 / 60;
        let lastTime = 0;

        function animate(timestamp) {
            requestAnimationFrame(animate);

            let dt = 0.016;
            if (timestamp) {
                if (lastTime === 0) lastTime = timestamp;
                dt = (timestamp - lastTime) / 1000;
                if (dt > 0.1) dt = 0.016; 
                lastTime = timestamp;
            }
            const fpsScale = dt * 60; 

            const nowTime = Date.now();
            const timeSec = timestamp ? timestamp * 0.001 : 0;

            mouse.x += (targetMouse.x - mouse.x) * 0.05 * fpsScale;
            mouse.y += (targetMouse.y - mouse.y) * 0.05 * fpsScale;

            if (gameState === 'SELECT') {
                camera.position.x = mouse.x * 0.8;
                camera.position.y = 0.2 + mouse.y * 0.4;
                camera.position.z = 13.0;
                camera.lookAt(0, 0.2, 8.8);

                raycaster.setFromCamera(targetMouse, camera);
                const choiceMeshes = selectionEyes.map(se => se.mesh);
                const intersects = raycaster.intersectObjects(choiceMeshes);

                let castBreed = -1;
                if (intersects.length > 0) {
                    const hitEye = selectionEyes.find(se => se.mesh === intersects[0].object);
                    if (hitEye) {
                        castBreed = hitEye.breed;
                    }
                }

                if (castBreed !== hoveredBreedIndex) {
                    setHoveredBreed(castBreed);
                }

                selectionEyes.forEach(se => {
                    const isHovered = se.breed === hoveredBreedIndex;
                    
                    const floatOffset = Math.sin(timeSec * 2.5 + se.breed * 1.5) * 0.08;
                    se.mesh.position.y = se.originalY + floatOffset;

                    const targetScaleFactor = isHovered ? 1.25 : 1.0;
                    se.scale.lerp(new THREE.Vector3(targetScaleFactor, targetScaleFactor, targetScaleFactor), 0.1 * fpsScale);
                    se.mesh.scale.copy(se.scale);

                    const targetLook = new THREE.Vector3(mouse.x * 5, mouse.y * 3, 14.5);
                    const lookRotation = new THREE.Matrix4();
                    lookRotation.lookAt(targetLook, se.mesh.position, camera.up);
                    const targetQuaternion = new THREE.Quaternion().setFromRotationMatrix(lookRotation);
                    const correction = new THREE.Quaternion().setFromEuler(se.baseRotationOffset);
                    targetQuaternion.multiply(correction);

                    se.mesh.quaternion.slerp(targetQuaternion, 0.08 * fpsScale);
                });

                const detailsPanel = document.getElementById('specimen-details');
                if (hoveredBreedIndex !== -1) {
                    const activeEye = selectionEyes.find(se => se.breed === hoveredBreedIndex);
                    if (activeEye) {
                        const tempV = new THREE.Vector3();
                        tempV.copy(activeEye.mesh.position);
                        tempV.y -= 0.52; 
                        tempV.project(camera);

                        const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
                        const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;

                        detailsPanel.style.left = `${x}px`;
                        detailsPanel.style.top = `${y}px`;
                        detailsPanel.classList.remove('opacity-0', 'pointer-events-none');
                        detailsPanel.classList.add('opacity-100', 'translate-y-0');
                    }
                } else {
                    detailsPanel.classList.add('opacity-0', 'translate-y-2');
                    detailsPanel.classList.remove('opacity-100', 'translate-y-0');
                }

            } else if (gameState === 'TRANSITION_ZOOM') {
                transitionTimer += dt;
                const transitionProgress = Math.min(1.0, transitionTimer / 1.1);

                const ease = smoothstep(0, 1, transitionProgress);
                camera.position.lerpVectors(zoomStartCamPos, zoomTargetCamPos, ease);
                
                const selectedEye = selectionEyes.find(e => e.breed === selectedBreed);
                camera.lookAt(selectedEye.mesh.position);

                if (transitionProgress >= 1.0) {
                    gameState = 'INTRO';
                    
                    scene.remove(selectionGroup);
                    selectionEyes.forEach(se => {
                        se.mesh.geometry.dispose();
                        se.mesh.material.dispose();
                    });
                    selectionGroup = null;
                    selectionEyes = [];
                    selectionLights = [];

                    spawnEyeballs(); 
                    createIntroPneumaticTube();
                }

            } else if (gameState === 'INTRO') {
                let flickerIntensity = 0;
                if (timeSec < 0.7) {
                    const burst = Math.sin(timeSec * 55) * Math.sin(timeSec * 14);
                    if (burst > 0.25) {
                        flickerIntensity = 3.5;
                    } else if (Math.random() < 0.07) {
                        flickerIntensity = 1.8;
                    } else {
                        flickerIntensity = 0.03;
                    }
                } else {
                    flickerIntensity = 3.0; 
                }
                
                if (tubeLightMat) tubeLightMat.color.setHex(flickerIntensity > 0.5 ? 0xffffff : 0x1a1a1f);

                if (introProgress < 1.0) {
                    introProgress += dt / 2.2;
                    if (introProgress > 1.0) introProgress = 1.0;

                    const clampedProg = Math.min(0.999, introProgress);
                    const eyeballPos = tubeSpline.getPointAt(clampedProg);
                    
                    if (introEyeballMesh) {
                        introEyeballMesh.position.copy(eyeballPos);
                        const tangent = tubeSpline.getTangentAt(clampedProg);
                        introEyeballMesh.lookAt(eyeballPos.clone().add(tangent));
                        introEyeballMesh.rotateZ(timeSec * 14.5);
                    }

                    const camProg = Math.max(0.0, introProgress - 0.14);
                    const camPos = tubeSpline.getPointAt(camProg);
                    camera.position.copy(camPos);
                    
                    if (introEyeballMesh) camera.lookAt(introEyeballMesh.position);

                    if (introLight) {
                        introLight.position.copy(camPos).add(new THREE.Vector3(0, 0.2, 0.1));
                        introLight.intensity = flickerIntensity * 2.2; 
                        introLight.distance = 6.0;
                    }

                } else if (transitionProgress < 1.0) {
                    transitionProgress += dt / 0.6;
                    if (transitionProgress >= 1.0) {
                        transitionProgress = 1.0;
                        endIntroSequence();
                    }

                    const breatheX = Math.sin(timeSec * 0.65) * 0.12;
                    const breatheY = Math.cos(timeSec * 0.5) * 0.08;
                    const breatheZ = Math.sin(timeSec * 0.3) * 0.06;

                    const targetCamPos = new THREE.Vector3(mouse.x * 1.8 + breatheX, mouse.y * 1.8 + breatheY, 15.0 + breatheZ);
                    const targetLookAt = new THREE.Vector3(0, -1, 0);

                    const exitCamPos = tubeSpline.getPointAt(0.92);
                    const exitLookAt = tubeSpline.getPointAt(1.0);

                    const easeStep = smoothstep(0, 1, transitionProgress);
                    camera.position.lerpVectors(exitCamPos, targetCamPos, easeStep);
                    
                    const curLook = new THREE.Vector3().lerpVectors(exitLookAt, targetLookAt, easeStep);
                    camera.lookAt(curLook);
                }
            } else if (gameState === 'PLAY') {
                const breatheX = Math.sin(timeSec * 0.65) * 0.12;
                const breatheY = Math.cos(timeSec * 0.5) * 0.08;
                const breatheZ = Math.sin(timeSec * 0.3) * 0.06;

                camera.position.x = mouse.x * 1.8 + breatheX;
                camera.position.y = mouse.y * 1.8 + breatheY;
                camera.position.z = 15.0 + breatheZ;
                camera.lookAt(0, -1, 0);
            }

            if (gameState === 'PLAY' || gameState === 'INTRO') {
                let ceilingBaseStrength = 4.0;
                let tubeColorHex = 0xffffff; 

                let microOscillation = Math.sin(timeSec * 115.0) * 0.15 + Math.sin(timeSec * 67.3) * 0.1;
                
                let voltageWave = Math.sin(timeSec * 0.95) * Math.sin(timeSec * 2.7);
                let dropMultiplier = 1.0;
                if (voltageWave > 0.5) {
                    dropMultiplier = 0.28 + Math.random() * 0.35; 
                }

                if (Math.random() < 0.015) {
                    dropMultiplier = 0.02 + Math.random() * 0.15; 
                }

                let finalCeilingIntensity = (ceilingBaseStrength + microOscillation) * dropMultiplier;

                if (finalCeilingIntensity < 0.45) {
                    tubeColorHex = 0x222233; 
                } else {
                    tubeColorHex = 0xffffff; 
                }

                mainCeilingLight.intensity = finalCeilingIntensity;
                lightTubeMesh.material.color.setHex(tubeColorHex);

                if (neonLight && neonTubeMesh && timestamp) {
                    const vibSpeed = timestamp * 0.07;
                    const dx = Math.sin(vibSpeed) * 0.006;
                    const dy = Math.cos(vibSpeed * 1.4) * 0.006;

                    neonTubeMesh.position.set(dx, 3.2 + dy, -5.35);
                    neonLight.position.set(dx, 3.2 + dy, -5.25);

                    let baseNeon = 3.0;
                    let breath = Math.sin(timeSec * 1.8) * 0.35 
                               + Math.sin(timeSec * 8.3) * 0.18 
                               + Math.sin(timeSec * 29.5) * 0.12;
                    
                    let gasSpit = 1.0;
                    if (Math.sin(timeSec * 1.1) * Math.cos(timeSec * 5.7) > 0.58) {
                        gasSpit = 0.3 + Math.random() * 0.65;
                    }
                    if (Math.random() < 0.008) {
                        gasSpit = 0.08;
                    }

                    neonLight.intensity = (baseNeon + breath) * gasSpit;
                    if (neonTubeMesh.material) {
                        neonTubeMesh.material.emissiveIntensity = (5.0 + breath * 1.6) * gasSpit;
                    }
                }
            } else {
                mainCeilingLight.intensity = 0.15;
                lightTubeMesh.material.color.setHex(0x111116);
                if (neonLight) neonLight.intensity = 0.0;
                if (neonTubeMesh && neonTubeMesh.material) neonTubeMesh.material.emissiveIntensity = 0.0;
                if (floorBounceLight) floorBounceLight.intensity = 0.0;
            }

            if (gameState === 'PLAY' || gameState === 'INTRO') {
                world.step(fixedTimeStep, Math.min(dt, 0.1), 3);
            }

            if (currentlyDraggedBody) {
                currentlyDraggedBody.angularVelocity.set(0, 0, 0);
            }

            activeRipples.forEach(r => {
                r.time += dt;
            });
            activeRipples = activeRipples.filter(r => r.time < r.maxLife);

            if (bloodPoolMesh) {
                bloodPoolMesh.position.y = bloodLevel;
                const vPosAttr = bloodPoolMesh.geometry.attributes.position;
                const elapsed = timestamp ? timestamp * 0.0025 : 0;
                
                if (activeRipples.length > 12) {
                    activeRipples.splice(0, activeRipples.length - 12);
                }
                const ripples = activeRipples;
                const numRipples = ripples.length;

                for (let i = 0; i < vPosAttr.count; i++) {
                    const vx = vPosAttr.getX(i);
                    const vz = vPosAttr.getZ(i);
                    
                    let vy = Math.sin(vx * 0.4 + elapsed) * 0.08 + Math.cos(vz * 0.35 + elapsed * 1.1) * 0.07;
                    
                    for (let rIdx = 0; rIdx < numRipples; rIdx++) {
                        const r = ripples[rIdx];
                        const dx = vx - r.x;
                        const dz = vz - r.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        const speed = 4.2; 
                        const waveFront = r.time * speed;
                        const distDiff = Math.abs(dist - waveFront);
                        
                        if (dist < waveFront && distDiff < 2.0) {
                            const amp = r.strength * Math.exp(-dist * 0.35) * Math.exp(-r.time * 1.8);
                            const blend = Math.cos((distDiff / 2.0) * Math.PI * 0.5);
                            vy += Math.sin((dist - waveFront) * 8.5) * amp * blend;
                        }
                    }

                    vPosAttr.setY(i, vy);
                }
                vPosAttr.needsUpdate = true;
                bloodPoolMesh.geometry.computeVertexNormals();
            }

            const isAgitating = window._agitateBoost > 0;
            if (isAgitating) window._agitateBoost -= 1;

            const delugeChance = isAgitating ? (0.022 * fpsScale) : (0.003 * fpsScale);
            const batchSize    = 1;
            const heavyChance  = isAgitating ? (0.02 * fpsScale) : (0.005 * fpsScale);

            if (gameState === 'PLAY' && isCeilingDelugeActive && Math.random() < delugeChance) {
                const isHeavyDrop = Math.random() < heavyChance;
                if (isHeavyDrop) {
                    const startPos = new THREE.Vector3(
                        (Math.random() - 0.5) * CONFIG.roomWidth,
                        (CONFIG.roomHeight / 2) - 0.5,
                        (Math.random() - 0.5) * CONFIG.roomDepth
                    );
                    spawnHeavyBloodDrop(startPos);
                } else {
                    for (let i = 0; i < batchSize; i++) {
                        const startPos = new THREE.Vector3(
                            (Math.random() - 0.5) * CONFIG.roomWidth,
                            (CONFIG.roomHeight / 2) - 0.5,
                            (Math.random() - 0.5) * CONFIG.roomDepth
                        );
                        const gravityY = -5.0 - Math.random() * 10;
                        spawnBloodDrop(startPos, new THREE.Vector3(0, gravityY, 0));
                    }
                }
                adjustBloodVolume(isHeavyDrop ? 0.003 : 0.0008);
            }

            for (let i = bloodDrops.length - 1; i >= 0; i--) {
                const drop = bloodDrops[i];
                drop.velocity.y -= 9.81 * dt;
                drop.mesh.position.addScaledVector(drop.velocity, dt);

                const dropY = drop.mesh.position.y;
                
                if (dropY <= bloodLevel || dropY < -CONFIG.roomHeight / 2) {
                    if (dropY <= bloodLevel) {
                        if (drop.isHeavy) {
                            addRipple(drop.mesh.position.x, drop.mesh.position.z, 0.55);
                            playImpactSound(0.4);
                            const splashPos = new THREE.Vector3(
                                drop.mesh.position.x, bloodLevel + 0.15, drop.mesh.position.z
                            );
                            const splashCount = 10 + Math.floor(Math.random() * 5);
                            for (let s = 0; s < splashCount; s++) {
                                const angle = (s / splashCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
                                const speed = 1.8 + Math.random() * 2.5;
                                const vel = new THREE.Vector3(
                                    Math.cos(angle) * speed,
                                    1.2 + Math.random() * 2.0,
                                    Math.sin(angle) * speed
                                );
                                spawnBloodDrop(splashPos, vel);
                            }
                        } else {
                            addRipple(drop.mesh.position.x, drop.mesh.position.z, 0.08);
                        }
                    }

                    scene.remove(drop.mesh);
                    drop.mesh.geometry.dispose();
                    drop.mesh.material.dispose();
                    bloodDrops.splice(i, 1);
                    
                    if (Math.random() < 0.05 && bloodLevel < bloodMaxY) {
                        adjustBloodVolume(0.0001);
                    }
                }
            }

            for (let i = splatters.length - 1; i >= 0; i--) {
                const s = splatters[i];
                if (!s || !s.mesh) continue;

                const age = nowTime - s.creationTime;
                const decayProgress = Math.min(1.0, age / 18000); 

                if (decayProgress >= 1.0) {
                    scene.remove(s.mesh);
                    s.mesh.geometry.dispose();
                    if (s.mesh.material && s.mesh.material.dispose) {
                        s.mesh.material.dispose();
                    }
                    splatters.splice(i, 1);
                    continue;
                }

                const dryProgress = Math.min(1.0, age / 12000); 

                const freshColor = new THREE.Color(0xdf0b0b);
                const mediumColor = new THREE.Color(0x5c0202);
                const oldColor = new THREE.Color(0x180505);

                let currentColor = new THREE.Color();
                if (dryProgress < 0.3) {
                    currentColor.copy(freshColor).lerp(mediumColor, dryProgress / 0.3);
                } else {
                    currentColor.copy(mediumColor).lerp(oldColor, (dryProgress - 0.3) / 0.7);
                }

                if (s.mesh.material) {
                    s.mesh.material.color.copy(currentColor);
                    s.mesh.material.roughness = THREE.MathUtils.lerp(0.02, 0.95, dryProgress);
                    s.mesh.material.opacity = (0.92 * (1.0 - decayProgress));
                }

                const currentDripVelocity = s.dripVelocity * (1.0 - dryProgress);

                if (currentDripVelocity > 0 && s.mesh.position.y > bloodLevel) {
                    const prevY = s.mesh.position.y;
                    s.mesh.position.y -= currentDripVelocity * fpsScale;
                    s.mesh.scale.y = Math.min(1.6, s.mesh.scale.y + 0.0004 * fpsScale);

                    s.dripDistanceAccumulator = (s.dripDistanceAccumulator || 0) + (prevY - s.mesh.position.y);
                    if (s.dripDistanceAccumulator > 0.12) {
                        s.dripDistanceAccumulator = 0;
                        const trailSize = s.size * 0.35 * (s.mesh.scale.x);
                        spawnTrailDroplet(s.mesh.position, s.normal, trailSize, s.mesh.material.opacity * 0.75, currentColor);
                    }
                }
            }

            const screenGazeTarget = new THREE.Vector3(mouse.x * 6, mouse.y * 6, 4);

            if (gameState === 'PLAY' || gameState === 'INTRO') {
                eyeballs.forEach(eyeball => {
                    eyeball.mesh.position.copy(eyeball.body.position);
                    
                    const ballY = eyeball.body.position.y;
                    const submersionDepth = bloodLevel - (ballY - CONFIG.ballRadius);
                    const isSubmerged = submersionDepth > 0;
                    
                    const prevSubmerged = eyeball.isSubmerged || false;
                    eyeball.isSubmerged = isSubmerged;

                    if (isSubmerged && !prevSubmerged) {
                        const entryVel = Math.abs(eyeball.body.velocity.y);
                        if (entryVel > 0.4) {
                            addRipple(eyeball.body.position.x, eyeball.body.position.z, Math.min(1.3, entryVel * 0.16));
                            triggerBloodBurst(new THREE.Vector3(eyeball.body.position.x, bloodLevel + 0.15, eyeball.body.position.z), Math.min(7, Math.floor(entryVel * 1.4)));
                        }
                    }
                    
                    if (isSubmerged) {
                        const buoyantForce = submersionDepth * 40; 
                        eyeball.body.force.y += buoyantForce;
                        
                        const dragFactorX = Math.pow(0.97, fpsScale);
                        const dragFactorY = Math.pow(0.95, fpsScale);
                        eyeball.body.velocity.x *= dragFactorX;
                        eyeball.body.velocity.y *= dragFactorY;
                        eyeball.body.velocity.z *= dragFactorX;
                        eyeball.body.angularVelocity.scale(Math.pow(0.96, fpsScale), eyeball.body.angularVelocity);

                        eyeball.bloodiness = Math.min(1.0, eyeball.bloodiness + 0.008 * fpsScale);

                        if (isAgitating) {
                            const swirlAngle = timeSec * 1.5 + eyeball.body.position.y * 0.1;
                            eyeball.body.force.x += Math.cos(swirlAngle) * 5.0 * fpsScale;
                            eyeball.body.force.z += Math.sin(swirlAngle) * 5.0 * fpsScale;
                            eyeball.body.force.y += (Math.sin(timeSec * 2.0 + eyeball.body.position.x) * 2.0 + 3.0) * fpsScale;
                        }
                    } else {
                        if (isAgitating) {
                            eyeball.body.force.x += (Math.random() - 0.5) * 1.5 * fpsScale;
                            eyeball.body.force.z += (Math.random() - 0.5) * 1.5 * fpsScale;
                        }
                    }

                    if (ballY > -4.5 && !isSubmerged && eyeball.body !== currentlyDraggedBody) {
                        const velLength = eyeball.body.velocity.length();
                        if (velLength < 0.05) {
                            eyeball.body.force.y -= 3.0 * fpsScale;
                            eyeball.body.force.x -= eyeball.body.position.x * 0.5 * fpsScale;
                            eyeball.body.force.z -= eyeball.body.position.z * 0.5 * fpsScale;
                            eyeball.body.angularVelocity.set(0.1, 0.1, 0.1);
                        }
                    }

                    const depthFactor = THREE.MathUtils.clamp((ballY - (-6.0)) / 5.2, 0.08, 1.0);

                    if (eyeball.mesh.material) {
                        const baseColor = new THREE.Color(0xffffff).lerp(new THREE.Color(0x3d0101), eyeball.bloodiness);
                        eyeball.mesh.material.color.copy(baseColor).multiplyScalar(depthFactor);

                        if (eyeball.breed === 2 || eyeball.breed === 3) {
                            const darkEmissive = eyeball.targetEmissive.clone()
                                .lerp(new THREE.Color(0x220000), eyeball.bloodiness)
                                .multiplyScalar(depthFactor);
                            eyeball.mesh.material.emissive.copy(darkEmissive);
                        }
                    }

                    if (eyeball.body !== currentlyDraggedBody) {
                        if (eyeball.body.velocity.length() > 2.5) {
                            eyeball.mesh.quaternion.copy(eyeball.body.quaternion);
                        } else {
                            const lookRotation = new THREE.Matrix4();
                            lookRotation.lookAt(screenGazeTarget, eyeball.mesh.position, camera.up);
                            
                            const targetQuaternion = new THREE.Quaternion().setFromRotationMatrix(lookRotation);
                            const correction = new THREE.Quaternion().setFromEuler(eyeball.baseRotationOffset);
                            targetQuaternion.multiply(correction);

                            const slerpFactor = 1.0 - Math.pow(1.0 - 0.08, fpsScale);
                            eyeball.mesh.quaternion.slerp(targetQuaternion, slerpFactor);
                            eyeball.body.quaternion.copy(eyeball.mesh.quaternion);
                        }
                    } else {
                        eyeball.mesh.quaternion.copy(eyeball.body.quaternion);
                    }
                });
            }

            if (dragJoint && currentlyDraggedBody) {
                const dragY = dummyBody.position.y;
                const prevDragSub = currentlyDraggedBody.dragSubmerged || false;
                const dragSub = dragY < bloodLevel;
                currentlyDraggedBody.dragSubmerged = dragSub;
                if (dragSub !== prevDragSub) {
                    addRipple(dummyBody.position.x, dummyBody.position.z, 0.45);
                    triggerBloodBurst(new THREE.Vector3(dummyBody.position.x, bloodLevel + 0.1, dummyBody.position.z), 5);
                }
            }

            if (cubeCamera && bloodPoolMesh) {
                cubeCamera.position.set(0, bloodLevel + 0.08, 0);
                bloodPoolMesh.visible = false; 
                cubeCamera.update(renderer, scene);
                bloodPoolMesh.visible = true;
            }

            if (composer) {
                try {
                    composer.render();
                } catch(e) {
                    console.error("EffectComposer failed to render; falling back to WebGLRenderer:", e);
                    composer = null;
                }
            }
            
            if (!composer) {
                renderer.render(scene, camera);
            }
        }

        function runPipeline() {
            initSplatTextures();
            initDripTrailTexture();
            initPhysics();
            initThree();
            createDungeonRoom();
            createBloodPool();
            setupInteractions();
            
            initSelectionScene();

            adjustBloodVolume(0);
            animate();
            
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => {
                        loader.remove();
                        gameState = 'SELECT';
                        const selectUI = document.getElementById('ui-selection');
                        selectUI.classList.remove('opacity-0', 'pointer-events-none');
                    }, 1000);
                }
            }, 800);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', runPipeline);
        } else {
            runPipeline();
        }
    </script>
</body>
</html>
